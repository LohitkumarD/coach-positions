services:
  - type: web
    name: coach-position-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    # Free tier: preDeployCommand is not allowed; migrate on each dyno start (idempotent).
    startCommand: 'sh -c "python manage.py migrate --noinput && exec gunicorn coach_position.wsgi:application"'
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: coach_position.settings
      - key: DJANGO_DEBUG
        value: "False"
